[build]
  command = "npm run build:netlify"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api-connectivity-test"
  to = "/api-test"
  status = 301
  force = true

# Prevent Netlify edge from caching HTML pages.
# JS/CSS chunks under _next/static are content-hashed and safe to cache.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"