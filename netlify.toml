[build]
  command = "npm run build:netlify"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api-connectivity-test"
  to = "/api-test"
  status = 301
  force = true

# Prevent Netlify edge CDN from caching ANY HTML pages.
# The middleware also sets these, but this is a safety net.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma = "no-cache"
    Netlify-CDN-Cache-Control = "no-store, no-cache, must-revalidate"
    CDN-Cache-Control = "no-store"
    Surrogate-Control = "no-store"

# JS/CSS chunks under _next/static are content-hashed — cache forever.
# This MUST come after the wildcard rule to take priority.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"